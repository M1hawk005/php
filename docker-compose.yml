services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      POSTGRES_PRISMA_URL: postgresql://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/portfolio?schema=public
      POSTGRES_URL_NON_POOLING: postgresql://postgres:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/portfolio?schema=public
      FORUM_ADMIN_PASSWORD: ${FORUM_ADMIN_PASSWORD:?Set FORUM_ADMIN_PASSWORD in .env}
      FORUM_ADMIN_SESSION_SECRET: ${FORUM_ADMIN_SESSION_SECRET:?Set FORUM_ADMIN_SESSION_SECRET in .env}
      RATE_LIMIT_SALT: ${RATE_LIMIT_SALT:?Set RATE_LIMIT_SALT in .env}
      FORUM_IP_HEADER: x-forwarded-for
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - web
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

networks:
  web:
volumes:
  postgres_data:
  caddy_data:
  caddy_config:
